var CATEGORIES = ["all", "combat", "sports", "characters", "roleplay", "utility"];

/* ── BUILD TABS ── */
var tabsWrap = document.getElementById('tabsWrap');
CATEGORIES.forEach(function(cat) {
  var count = cat === 'all' ? scripts.length : scripts.filter(function(s){ return s[1] === cat; }).length;
  var btn = document.createElement('button');
  btn.className = 'tab' + (cat === 'all' ? ' active' : '');
  btn.setAttribute('data-cat', cat);
  btn.innerHTML = cat + '<span class="tab-count" data-cat-count="' + cat + '">' + count + '</span>';
  tabsWrap.appendChild(btn);
});

tabsWrap.addEventListener('click', function(e) {
  var el = e.target;
  /* walk up to find the .tab button (handles click on inner span) */
  while (el && el !== tabsWrap) {
    if (el.classList && el.classList.contains('tab')) break;
    el = el.parentNode;
  }
  if (!el || !el.classList.contains('tab')) return;
  var cats = tabsWrap.querySelectorAll('.tab');
  for (var i = 0; i < cats.length; i++) cats[i].classList.remove('active');
  el.classList.add('active');
  activeTab = el.getAttribute('data-cat');
  render();
});

function updateTabCounts(search) {
  CATEGORIES.forEach(function(cat) {
    var el = tabsWrap.querySelector('[data-cat-count="' + cat + '"]');
    if (!el) return;
    var count = scripts.filter(function(s) {
      var matchSearch = search ? s[0].toLowerCase().indexOf(search) !== -1 : true;
      var matchCat = cat === 'all' || s[1] === cat;
      return matchSearch && matchCat;
    }).length;
    el.textContent = count;
  });
}

function render() {
  var search = (document.getElementById('search').value || '').toLowerCase();
  var list = document.getElementById('scriptList');

  filtered = scripts.filter(function(s) {
    var matchSearch = s[0].toLowerCase().indexOf(search) !== -1;
    var matchCat = activeTab === 'all' || s[1] === activeTab;
    return matchSearch && matchCat;
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">no scripts found</div>';
  } else {
    list.innerHTML = filtered.map(function(s, i) {
      var delay = Math.min(i * 10, 160);
      return '<div class="script-row" style="-webkit-animation-delay:' + delay + 'ms;animation-delay:' + delay + 'ms">' +
        '<span class="row-num">' + (i + 1 < 10 ? '0' + (i + 1) : i + 1) + '</span>' +
        '<span class="row-name">' + s[0] + '</span>' +
        '<span class="row-tag">' + s[1] + '</span>' +
        '<button class="copy-btn" data-idx="' + i + '">copy</button>' +
      '</div>';
    }).join('');
  }

  document.getElementById('count').textContent =
    search || activeTab !== 'all'
      ? filtered.length + ' / ' + scripts.length
      : scripts.length + ' total';

  updateTabCounts(search);
}

/* ── COPY ── */
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function showToast(name) {
  var toast = document.getElementById('toast');
  document.getElementById('toastName').textContent = name;
  clearTimeout(toastTimer);
  clearTimeout(toastHide);
  toast.classList.remove('show');
  toastTimer = setTimeout(function() {
    toast.classList.add('show');
    toastHide = setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }, 10);
}

function doCopy(btn, text, name) {
  function onSuccess() {
    btn.textContent = 'done';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1400);
    showToast(name);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(function() { fallbackCopy(text); onSuccess(); });
  } else {
    fallbackCopy(text);
    onSuccess();
  }
}

document.getElementById('scriptList').addEventListener('click', function(e) {
  var btn = e.target;
  if (btn.classList.contains('copy-btn')) {
    var idx = parseInt(btn.getAttribute('data-idx'), 10);
    if (!isNaN(idx) && filtered[idx]) {
      doCopy(btn, filtered[idx][2], filtered[idx][0]);
    }
  }
});

function onFilter() { render(); }

render();

</script>
