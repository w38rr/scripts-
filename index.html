<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Playground Scripts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body, * { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg:       #04060d;
–surface:  #080e1a;
–card:     #0b1425;
–border:   #1a2d50;
–accent:   #00d4ff;
–accent2:  #7c3aed;
–green:    #00ff88;
–text:     #c8d8f0;
–muted:    #4a6080;
–glow:     0 0 12px rgba(0,212,255,.35);
–glow2:    0 0 20px rgba(0,212,255,.15);
}

html {
background: #04060d;
}

body {
font-family: ‘Rajdhani’, ‘Arial’, sans-serif;
background-color: #04060d !important;
background: #04060d !important;
color: #c8d8f0;
min-height: 100vh;
min-height: -webkit-fill-available;
display: -webkit-flex;
display: flex;
-webkit-justify-content: center;
justify-content: center;
-webkit-align-items: flex-start;
align-items: flex-start;
padding: 32px 16px;
overflow-x: hidden;
}

/* animated grid background */
body::before {
content: ‘’;
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background-image:
-webkit-linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
-webkit-linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
background-image:
linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

body::after {
content: ‘’;
position: fixed;
top: -50%;
left: -20%;
width: 60%;
height: 60%;
background: -webkit-radial-gradient(ellipse, rgba(124,58,237,.07) 0%, transparent 70%);
background: radial-gradient(ellipse, rgba(124,58,237,.07) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
-webkit-animation: drift 12s ease-in-out infinite alternate;
animation: drift 12s ease-in-out infinite alternate;
}

@keyframes drift {
from { transform: translate(0, 0); }
to   { transform: translate(10%, 8%); }
}

.container {
position: relative;
z-index: 1;
width: 420px;
max-width: 100%;
background-color: #080e1a;
background: #080e1a;
border: 1px solid #1a2d50;
border-radius: 4px;
padding: 0;
-webkit-box-shadow: 0 0 60px rgba(0,0,0,.7), inset 0 1px 0 rgba(0,212,255,.08);
box-shadow: 0 0 60px rgba(0,0,0,.7), inset 0 1px 0 rgba(0,212,255,.08);
-webkit-animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
}

@-webkit-keyframes slideUp {
from { opacity: 0; -webkit-transform: translateY(24px); transform: translateY(24px); }
to   { opacity: 1; -webkit-transform: translateY(0); transform: translateY(0); }
}
@keyframes slideUp {
from { opacity: 0; transform: translateY(24px); }
to   { opacity: 1; transform: translateY(0); }
}

/* top bar */
.topbar {
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
gap: 6px;
padding: 10px 14px;
border-bottom: 1px solid #1a2d50;
background: rgba(0,212,255,.03);
}

.dot {
width: 10px; height: 10px;
border-radius: 50%;
}
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }

.topbar-title {
margin-left: auto;
margin-right: auto;
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: var(–muted);
letter-spacing: .08em;
}

/* header */
.header {
padding: 22px 20px 16px;
border-bottom: 1px solid var(–border);
position: relative;
}

.header::after {
content: ‘’;
position: absolute;
bottom: -1px; left: 20px;
width: 60px; height: 2px;
background: var(–accent);
box-shadow: var(–glow);
}

h1 {
font-size: 22px;
font-weight: 700;
letter-spacing: .06em;
text-transform: uppercase;
color: #fff;
}

h1 span {
color: var(–accent);
text-shadow: var(–glow);
}

.subtitle {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: var(–muted);
margin-top: 4px;
letter-spacing: .05em;
}

.count-badge {
display: inline-block;
background: rgba(0,212,255,.1);
border: 1px solid rgba(0,212,255,.25);
color: var(–accent);
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
padding: 2px 7px;
border-radius: 2px;
margin-top: 8px;
letter-spacing: .04em;
}

/* search */
.search-wrap {
padding: 14px 20px;
border-bottom: 1px solid var(–border);
position: relative;
}

.search-wrap::before {
content: ‘⌕’;
position: absolute;
left: 34px;
top: 50%;
transform: translateY(-50%);
color: var(–muted);
font-size: 16px;
pointer-events: none;
}

input[type=“text”] {
width: 100%;
padding: 9px 12px 9px 36px;
background: var(–card);
border: 1px solid var(–border);
border-radius: 3px;
color: var(–text);
font-family: ‘Share Tech Mono’, monospace;
font-size: 12px;
letter-spacing: .04em;
outline: none;
transition: border-color .2s, box-shadow .2s;
}

input[type=“text”]::placeholder { color: var(–muted); }

input[type=“text”]:focus {
border-color: var(–accent);
box-shadow: var(–glow2);
}

/* script list */
.script-list {
max-height: 480px;
overflow-y: auto;
padding: 10px 14px;
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
}

.script-list::-webkit-scrollbar { width: 4px; }
.script-list::-webkit-scrollbar-track { background: transparent; }
.script-list::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.script-card {
display: -webkit-flex;
display: flex;
-webkit-justify-content: space-between;
justify-content: space-between;
-webkit-align-items: center;
align-items: center;
padding: 9px 12px;
margin-bottom: 4px;
background-color: #0b1425;
background: #0b1425;
border: 1px solid transparent;
border-radius: 3px;
-webkit-transition: border-color .18s, background .18s, -webkit-transform .18s;
transition: border-color .18s, background .18s, transform .18s;
-webkit-animation: fadeIn .3s ease both;
animation: fadeIn .3s ease both;
position: relative;
overflow: hidden;
}

.script-card::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 2px;
background: #00d4ff;
opacity: 0;
-webkit-transition: opacity .2s;
transition: opacity .2s;
}

.script-card:hover {
border-color: #1a2d50;
background: #0e1d35;
-webkit-transform: translateX(2px);
transform: translateX(2px);
}

.script-card:hover::before { opacity: 1; }

@-webkit-keyframes fadeIn {
from { opacity: 0; -webkit-transform: translateY(6px); transform: translateY(6px); }
to   { opacity: 1; -webkit-transform: translateY(0); transform: translateY(0); }
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(6px); }
to   { opacity: 1; transform: translateY(0); }
}

.script-index {
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
color: var(–muted);
width: 22px;
flex-shrink: 0;
}

.script-name {
font-size: 13px;
font-weight: 500;
color: var(–text);
flex: 1;
letter-spacing: .02em;
}

.copy-btn {
border: 1px solid #1a2d50;
background: transparent;
color: #4a6080;
padding: 5px 10px;
border-radius: 2px;
font-family: ‘Share Tech Mono’, ‘Courier New’, monospace;
font-size: 10px;
letter-spacing: .06em;
cursor: pointer;
text-transform: uppercase;
-webkit-transition: all .18s;
transition: all .18s;
-webkit-flex-shrink: 0;
flex-shrink: 0;
-webkit-appearance: none;
appearance: none;
}

.copy-btn:hover {
border-color: #00d4ff;
color: #00d4ff;
-webkit-box-shadow: 0 0 20px rgba(0,212,255,.15);
box-shadow: 0 0 20px rgba(0,212,255,.15);
background: rgba(0,212,255,.05);
}

.copy-btn.copied {
border-color: #00ff88;
color: #00ff88;
-webkit-box-shadow: 0 0 12px rgba(0,255,136,.2);
box-shadow: 0 0 12px rgba(0,255,136,.2);
background: rgba(0,255,136,.05);
}

@-webkit-keyframes drift {
from { -webkit-transform: translate(0, 0); transform: translate(0, 0); }
to   { -webkit-transform: translate(10%, 8%); transform: translate(10%, 8%); }
}
@keyframes drift {
from { transform: translate(0, 0); }
to   { transform: translate(10%, 8%); }
}

/* footer */
.footer {
padding: 10px 20px;
border-top: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
}

.status {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: var(–green);
letter-spacing: .04em;
min-height: 16px;
transition: opacity .3s;
opacity: 0;
}

.status.visible { opacity: 1; }

.result-count {
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
color: var(–muted);
letter-spacing: .04em;
}

.no-results {
text-align: center;
padding: 32px 0;
font-family: ‘Share Tech Mono’, monospace;
font-size: 12px;
color: var(–muted);
}
</style>

</head>
<body>

<div class="container">
  <div class="topbar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="topbar-title">playground_scripts.exe</span>
  </div>

  <div class="header">
    <h1>Playground <span>Scripts</span></h1>
    <div class="subtitle">// roblox exploit library</div>
    <div class="count-badge" id="totalBadge">LOADING...</div>
  </div>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="search scripts..." oninput="filterScripts()">
  </div>

  <div class="script-list" id="scriptList"></div>

  <div class="footer">
    <div class="status" id="status">✓ COPIED TO CLIPBOARD</div>
    <div class="result-count" id="resultCount"></div>
  </div>
</div>

<script>
const scripts = [
["All Characters",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/All%20characters"))()'],
["Arcade Basketball",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Arcade%20basketball"))()'],
["Blood Debt",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Blood%20debt"))()'],
["Brookhaven",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Brookhaven"))()'],
["Bug Test",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Bug%20test"))()'],
["Bypass Marvellous",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Bypass-marvellous"))()'],
["Carry People 3",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Carry%20people%203"))()'],
["Characters v1",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Characters%20v1"))()'],
["Characters v2",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Characters%20v2"))()'],
["Characters v3",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Characters%20v3"))()'],
["Chicago Trenches",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Chicago-Trenches"))()'],
["Chose ur power",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Chose%20ur%20power"))()'],
["Draw a raft",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Draw-a-raft"))()'],
["FPV DRONE",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/FPV%20DRONE"))()'],
["Fall and break bones",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Fall%20and%20break%20bones"))()'],
["Fame",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Fame"))()'],
["Field Goal Simulator",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Field%20Goal%20simulator"))()'],
["Fireball Training",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Fireball-Training"))()'],
["Flag Football",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Flag%20football"))()'],
["Football Duals",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Football%20duals"))()'],
["Frisbee",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Frisbee"))()'],
["Genic Ragdoll Blood",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Genic%20ragdoll%20blood"))()'],
["Grab Battles",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Grab%20battles"))()'],
["Grapple People",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Grapple%20people"))()'],
["High Bounce",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/High%20bounce"))()'],
["Highway Showdown",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Highway-showdown"))()'],

["Last Letter",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Last%20letter"))()'],
["Leaf Collector",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Leaf%20Collector"))()'],
["Marked",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Marked"))()'],
["Mine a Brainrot",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Mine-a-brainrot"))()'],
["Mvs",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Mvs"))()'],
["NBA Champs",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Nba%20champs"))()'],
["New Dawn",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/New%20Dawn"))()'],
["Nose Battles",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Nose%20battles"))()'],
["One Tap",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/One-tap"))()'],
["Playground Basketball",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Playground%20basketball"))()'],
["Point Sender",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Point-sender"))()'],
["Poop",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Poop"))()'],
["Quick Shot",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Quck-shot"))()'],
["Shopping Drift",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Shopping-drift-at-driftmart"))()'],
["Slap Duals",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Slap-duals"))()'],
["Soccer Arena",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Soccer-arena"))()'],
["Speed Brainrot",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Speed-brainrot"))()'],
["Sword Reach",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Sword%20reach"))()'],
["Touch Soccer",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Touch%20soccer"))()'],
["Violent",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Violent"))()']
];

document.getElementById('totalBadge').textContent = `${scripts.length} SCRIPTS LOADED`;

let statusTimer;

function renderScripts(filter = "") {
  const list = document.getElementById("scriptList");
  const filtered = scripts.filter(s => s[0].toLowerCase().includes(filter.toLowerCase()));

  if (filtered.length === 0) {
    list.innerHTML = `<div class="no-results">// no scripts found</div>`;
  } else {
    list.innerHTML = filtered.map((script, i) => `
      <div class="script-card" style="animation-delay:${Math.min(i * 18, 200)}ms">
        <span class="script-index">${String(i+1).padStart(2,'0')}</span>
        <span class="script-name">${script[0]}</span>
        <button class="copy-btn" onclick='copyScript(this, ${JSON.stringify(script[1])})'>COPY</button>
      </div>
    `).join('');
  }

  document.getElementById('resultCount').textContent =
    filter ? `${filtered.length} / ${scripts.length}` : `${scripts.length} total`;
}

function copyScript(btn, script) {
  navigator.clipboard.writeText(script);

  btn.textContent = 'DONE';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = 'COPY';
    btn.classList.remove('copied');
  }, 1500);

  const status = document.getElementById("status");
  status.classList.add('visible');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => status.classList.remove('visible'), 2000);
}

function filterScripts() {
  renderScripts(document.getElementById("search").value);
}

renderScripts();
</script>

</body>
</html>
