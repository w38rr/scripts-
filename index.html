<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Script Hub</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    padding:20px;
}
.container{
    width:380px;
    background:rgba(30,41,59,.95);
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}
h1{
    text-align:center;
    font-size:22px;
}
input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}
.script-list{
    max-height:500px;
    overflow-y:auto;
}
.script-card{
    background:#0f172a;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
}
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#0ea5e9;
}
.status{
    text-align:center;
    margin-top:10px;
    color:#22c55e;
}
</style>
</head>
<body>

<input type="text" id="search" placeholder="Search scripts..." onkeyup="filterScripts()">

function renderScripts(filter=""){
    const list=document.getElementById("scriptList");
    list.innerHTML="";
    scripts.filter(s=>s[0].toLowerCase().includes(filter.toLowerCase()))
    .forEach(script=>{
        list.innerHTML+=`
        <div class="script-card">
            <div>${script[0]}</div>
            <button onclick='copyScript(${JSON.stringify(script[1])})'>Copy Script</button>
        </div>`;
    });
}

function copyScript(script){
    navigator.clipboard.writeText(script);
    document.getElementById("status").innerText="✅ Script copied!";
}

function filterScripts(){
    renderScripts(document.getElementById("search").value);
}

renderScripts();
