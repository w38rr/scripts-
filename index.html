<body>
<div class="container">

    <div class="titlebar">
      <div class="dot dot-r"></div>

    </div>

["Frisbee",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Frisbee"))()'],

["Soccer Arena",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Soccer-arena"))()'],
["Speed Brainrot",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Speed-brainrot"))()'],
["Sword Reach",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Sword%20reach"))()'],
["Touch Soccer",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Touch%20soccer"))()'],
["Violent",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Violent"))()']
];

document.getElementById('badge').textContent = scripts.length + ' scripts';

let timer;

function render(filter) {
  filter = filter || '';
  const list = document.getElementById('scriptList');
  const hits = scripts.filter(s => s[0].toLowerCase().includes(filter.toLowerCase()));

  if (!hits.length) {
    list.innerHTML = '<div class="no-results">no scripts found</div>';
  } else {
    list.innerHTML = hits.map((s, i) =>
      '<div class="script-row" style="-webkit-animation-delay:' + Math.min(i*10,160) + 'ms;animation-delay:' + Math.min(i*10,160) + 'ms">' +
        '<span class="row-num">' + String(i+1).padStart(2,'0') + '</span>' +
        '<span class="row-name">' + s[0] + '</span>' +
        '<button class="copy-btn" onclick="doCopy(this,' + JSON.stringify(s[1]) + ')">copy</button>' +
      '</div>'
    ).join('');
  }

  document.getElementById('count').textContent =
    filter ? hits.length + ' / ' + scripts.length : scripts.length + ' total';
}

function doCopy(btn, code) {
  try {
    navigator.clipboard.writeText(code);
  } catch(e) {
    var ta = document.createElement('textarea');
    ta.value = code; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
  btn.textContent = 'done';
  btn.classList.add('copied');
  setTimeout(function(){ btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1400);
  var st = document.getElementById('status');
  st.classList.add('on');
  clearTimeout(timer);
  timer = setTimeout(function(){ st.classList.remove('on'); }, 1800);
}

function filterScripts() { render(document.getElementById('search').value); }

render();
</script>
